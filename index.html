<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #alert { display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 15px; border: 3px solid #ffcc00; text-align: center; }
    </style>
</head>
<body>

<div id="alert">
    <h1 id="name">...</h1>
    <h2 id="amount">...</h2>
</div>

<audio id="sound" src="C:\Users\ds427\OneDrive\เดสก์ท็อป\2026-04-14-16-42-52.mp3"></audio> <script>
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwBPM9I78PYeFJa1NTjlwUg7sMdofFTd3Kj8NqLrx7dzCRthKiOA-fBc-HOPp7FLBmH/exec';
    let lastData = "";

    async function check() {
        const res = await fetch(webAppUrl);
        const data = await res.json();
        if (data.name + data.amount !== lastData) {
            document.getElementById('name').innerText = data.name;
            document.getElementById('amount').innerText = "โดเนท: " + data.amount + " บาท";
            document.getElementById('alert').style.display = 'block';
            document.getElementById('sound').play();
            setTimeout(() => { document.getElementById('alert').style.display = 'none'; }, 8000);
            lastData = data.name + data.amount;
        }
    }
    setInterval(check, 5000);
</script>
</body>
</html>
