<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>

    <div id="alert-box" style="display:none; background:black; color:white; padding:20px;">
        <h1 id="donor-name">...</h1>
        <h2 id="donor-amount">...</h2>
        <p id="donor-message">...</p>
    </div>

    <audio id="alert-sound" src="alert-sound.mp3"></audio>

    <script>
        const webAppUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRU8uL7yDtj-tUEluvGndvQbS0FIXXFTxyM24atiP7Uj25ENsy2CwdgnXBSHEb3h0OOSVFA5gB3ySsw/pub?output=csv'; // ใส่ URL จาก Google Apps Script ที่นี่

        async function updateData() {
            try {
                const response = await fetch(webAppUrl);
                const data = await response.json();

                // แสดงข้อมูล
                document.getElementById('donor-name').innerText = data.name;
                document.getElementById('donor-amount').innerText = "จำนวน: " + data.amount + " บาท";
                document.getElementById('donor-message').innerText = "ข้อความ: " + data.message;
                
                // โชว์กล่อง
                document.getElementById('alert-box').style.display = 'block';

                // เล่นเสียง (ต้องกด Interact ในโปรแกรมก่อน)
                const sound = document.getElementById('alert-sound');
                sound.play();

                setTimeout(() => { document.getElementById('alert-box').style.display = 'none'; }, 10000);
            } catch (error) {
                console.error("ดึงข้อมูลพลาด:", error);
            }
        }
        setInterval(updateData, 10000);
    </script>
</body>
</html>
